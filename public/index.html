<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Tracker - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #666;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        .form h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .message {
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="tabs">
            <div class="tab active" onclick="showForm('login')">Login</div>
            <div class="tab" onclick="showForm('register')">Register</div>
        </div>
        
        <div id="login-form" class="form active">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Select Role</label>
                    <select class="form-control" id="login-role" required>
                        <option value="">Select Role</option>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" id="login-email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="login-password" required>
                </div>
                
                <button type="submit" class="btn">Login</button>
            </form>
            <div id="login-message" class="message"></div>
        </div>
        
        <div id="register-form" class="form">
            <h2>Create Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Select Role</label>
                    <select class="form-control" id="register-role" required onchange="toggleRegisterFields()">
                        <option value="">Select Role</option>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="register-name" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" id="register-email" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="register-password" required>
                </div>
                
                <div id="student-fields" style="display: none;">
                    <div class="form-group">
                        <label>Roll Number</label>
                        <input type="text" class="form-control" id="register-rollno">
                    </div>
                    
                    <div class="form-group">
                        <label>College</label>
                        <input type="text" class="form-control" id="register-college">
                    </div>
                    
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" class="form-control" id="register-dept">
                    </div>
                </div>
                
                <div id="faculty-fields" style="display: none;">
                    <div class="form-group">
                        <label>Employee ID</label>
                        <input type="text" class="form-control" id="register-empid">
                    </div>
                    
                    <div class="form-group">
                        <label>Designation</label>
                        <input type="text" class="form-control" id="register-designation">
                    </div>
                </div>
                
                <button type="submit" class="btn">Create Account</button>
            </form>
            <div id="register-message" class="message"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + "/api";

        async function apiCall(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };
            if (body) options.body = JSON.stringify(body);

            const response = await fetch(`${API_URL}${endpoint}`, options);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'API Error');
            return data;
        }

        function showForm(formType) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.tab[onclick="showForm('${formType}')"]`).classList.add('active');
            
            // Update forms
            document.querySelectorAll('.form').forEach(form => form.classList.remove('active'));
            document.getElementById(`${formType}-form`).classList.add('active');
        }
        
        function toggleRegisterFields() {
            const role = document.getElementById('register-role').value;
            
            document.getElementById('student-fields').style.display = 'none';
            document.getElementById('faculty-fields').style.display = 'none';
            
            if (role === 'student') {
                document.getElementById('student-fields').style.display = 'block';
            } else if (role === 'faculty') {
                document.getElementById('faculty-fields').style.display = 'block';
            }
        }
        
        // Login form
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const role = document.getElementById('login-role').value;
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        
        try {
            // Call backend API instead of simple local check
            const response = await apiCall('/auth/login', 'POST', { email, password, role });
            
            showMessage('login-message', 'Login successful!', 'success');
            
            // Store session info
            if (role === 'student') {
                localStorage.setItem('studentLoggedIn', 'true');
                localStorage.setItem('studentInfo', JSON.stringify(response.user));
                setTimeout(() => window.location.href = 'student-dashboard.html', 1000);
            } else {
                localStorage.setItem('facultyLoggedIn', 'true');
                localStorage.setItem('facultyInfo', JSON.stringify(response.user));
                setTimeout(() => window.location.href = 'faculty-dashboard.html', 1000);
            }
        } catch (error) {
            showMessage('login-message', error.message, 'error');
        }
    });
        
        // Register form
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const role = document.getElementById('register-role').value;
        const name = document.getElementById('register-name').value;
        const email = document.getElementById('register-email').value;
        const password = document.getElementById('register-password').value;
        
        const userInfo = { role, name, email, password };
        
        // Add role-specific details into a "details" map for the backend
        if (role === 'student') {
            userInfo.details = {
                rollNo: document.getElementById('register-rollno').value,
                college: document.getElementById('register-college').value,
                department: document.getElementById('register-dept').value
            };
        } else {
            userInfo.details = {
                empId: document.getElementById('register-empid').value,
                designation: document.getElementById('register-designation').value
            };
        }

        try {
            await apiCall('/auth/register', 'POST', userInfo);
            showMessage('register-message', 'Account created! Please login.', 'success');
            if(role == 'student'){
                alert(
                "✅ Registration Successful!\n\n" +
                "📢 IMPORTANT: To receive event updates, please check your email inbox (and spam folder) " +
                "now for a 'Subscription Confirmation' from AWS SNS. You MUST click the link in that email " +
                "to activate notifications."
             );
            }
            setTimeout(() => showForm('login'), 2000);
        } catch (error) {
            showMessage('register-message', error.message, 'error');
        }
    });
        
        function showMessage(elementId, text, type) {
            const element = document.getElementById(elementId);
            element.textContent = text;
            element.className = `message ${type}`;
            element.style.display = 'block';
            
            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }
        
        // For testing - quick login buttons
        window.quickLoginStudent = function() {
            localStorage.setItem('studentLoggedIn', 'true');
            window.location.href = 'student-dashboard.html';
        };
        
        window.quickLoginFaculty = function() {
            localStorage.setItem('facultyLoggedIn', 'true');
            window.location.href = 'faculty-dashboard.html';
        };
    </script>
    
    <!-- Quick test buttons (remove in production) -->
    <div style="position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px;">
        <button onclick="quickLoginStudent()" style="padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Quick Student Login
        </button>
        <button onclick="quickLoginFaculty()" style="padding: 10px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Quick Faculty Login
        </button>
    </div>
</body>
</html>
